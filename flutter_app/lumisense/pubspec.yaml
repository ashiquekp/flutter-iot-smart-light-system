name: lumisense
description: Smart light automation system using Flutter and ESP32
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^13.0.0
  
  # MQTT
  mqtt_client: ^10.3.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Charts
  fl_chart: ^0.66.0
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  
  # Permissions
  permission_handler: ^11.3.0
  
  # CSV Export
  csv: ^5.1.1
  path_provider: ^2.1.2
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # Utilities
  intl: ^0.18.1
  connectivity_plus: ^6.1.5
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/